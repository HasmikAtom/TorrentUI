services:
  auth-service:
    restart: always
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: torrent-auth-prod
    env_file:
      - .env.prod
    environment:
      - GO_BACKEND_URL=http://backend:8080
      - DATABASE_PATH=/data/auth.sqlite
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    depends_on:
      - backend

  backend:
    restart: always
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: torrent-backend-prod
    env_file:
      - .env.prod
    environment:
      - DATABASE_PATH=/data/backend.sqlite
    expose:
      - "8080"
    volumes:
      - /:/hostfs:ro
      - ./data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: torrent-network
    driver: bridge
