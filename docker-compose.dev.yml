services:
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile.dev
    container_name: torrent-auth-dev
    env_file:
      - .env.dev
    environment:
      - GO_BACKEND_URL=http://backend-dev:8080
      - DATABASE_PATH=/data/auth.sqlite
      - NODE_ENV=development
      - PORT=3000
    expose:
      - "3000"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
      - ./data-dev:/data
    depends_on:
      - backend-dev

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: torrent-backend-dev
    env_file:
      - .env.dev
    environment:
      - DATABASE_PATH=/data/backend.sqlite
    expose:
      - "8080"
    volumes:
      - ./backend:/app
      - /:/hostfs:ro
      - ./data-dev:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: torrent-frontend-dev
    environment:
      - VITE_API_TARGET=http://auth-service:3000/
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth-service

networks:
  default:
    name: torrent-dev-network
    driver: bridge
